name: Check node dist files

on:
  pull_request:


jobs:
  changed_files:
    runs-on: ubuntu-latest-low
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            assets:
              - 'js/**'
              - 'css/**'

    name: Check node dist files
    steps:
      - name: Run step if any file(s) in the assets folder change
        if: needs.changes.outputs.assets == 'true'
        run: |
          echo "One or more files in the js folder has changed. Do NOT commit files in there as they will be generated automatically once a pull request is merged"
          echo "List all the files that have changed: ${{ steps.changes.outputs.assets_files }}"
          exit 1
