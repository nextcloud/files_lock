name: Update Node dist

on:
  workflow_dispatch:
  push:
    branches:
      # implemented since 34, once branched off, add your stable branch here
      - main
      - 'stable3[4-9]'

permissions:
  contents: write

concurrency:
  group: update-node-dist-${{ github.head_ref || github.ref || github.run_id }}

jobs:
  update-node-dist:
    runs-on: ubuntu-latest
    environment: update-node-dist

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Needed to allow force push later
          persist-credentials: true
          token: ${{ secrets.COMMAND_BOT_PAT }}

      - name: Read package.json node and npm engines version
        uses: skjnldsv/read-package-engines-version-actions@06d6baf7d8f41934ab630e97d9e6c0bc9c9ac5e4 # v3
        id: versions
        with:
          fallbackNode: '^24'
          fallbackNpm: '^11.3'

      - name: Set up node ${{ steps.versions.outputs.nodeVersion }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.nodeVersion }}

      - name: Set up npm ${{ steps.versions.outputs.npmVersion }}
        run: npm i -g npm@"${{ steps.versions.outputs.npmVersion }}"

      - name: Setup git
        run: |
          git config --local user.email "nextcloud-command@users.noreply.github.com"
          git config --local user.name "nextcloud-command"

      - name: Get last commit message if it was not a recompile
        id: last_commit
        run: |
          {
            echo 'MESSAGE<<EOF'
            git log -1 --pretty=%s | grep -v '^build(assets): recompile assets$' || test $? -eq 1
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Install dependencies & build
        if: steps.last_commit.outputs.MESSAGE != ''
        env:
          CYPRESS_INSTALL_BINARY: 0
        run: |
          npm ci
          npm run build --if-present

      - name: Check build changes
        id: changes
        continue-on-error: true
        run: |
          {
            echo 'CHANGED<<EOF'
            git status --porcelain
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Add and commit
        if: steps.changes.outputs.CHANGED != ''
        run: |
          git add --force js/ css/
          git commit --signoff -m 'build(assets): recompile assets'
          git push origin ${{ github.head_ref }}
