version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    open-pull-requests-limit: 10
    labels:
      - "3. to review"
      - "dependencies"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    open-pull-requests-limit: 10
    labels:
      - "3. to review"
      - "dependencies"

  # Main stableXX npm
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable34
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # ignore all GitHub linguist patch updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable33
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # ignore all GitHub linguist patch updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable32
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # ignore all GitHub linguist patch updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]


  # Main stable34 composer
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable34
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # do not do breaking changes on stable branches
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Main stable33 composer
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable33
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # do not do breaking changes on stable branches
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Main stable32 composer
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "03:00"
      timezone: Europe/Paris
    cooldown:
      default-days: 10
    target-branch: stable32
    labels:
      - "3. to review"
      - "dependencies"
    ignore:
      # do not do breaking changes on stable branches
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
